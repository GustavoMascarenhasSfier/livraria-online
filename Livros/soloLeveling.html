<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling</title>
    <link rel="stylesheet" href="livroDecricao.css">
</head>
<body>
    <!-- Cabeçalho com informações principais e navegação -->
    <header>
        <div class="top-bar">
            <!-- Informações do topo (logo e área do usuário) -->
            <div class="topProps">
                <img class="logo" src="../imagens/logo.png.png" alt="Logo da Booklândia">
                <h2>The Beyond Bookstore</h2>
            </div>
            
            <div class="login-container">
                <div>
                    <a href="#" class="login-link">Login ou cadastro</a>
                </div>
                
            </div>
        </div>

    </header>

    <!-- Corpo principal da página -->
    <main>
        <!-- Seção para exibir detalhes do livro e compra -->
        <section>
            <div class="container">
                <!-- Imagem do livro -->
                <div class="image">
                    <img src="../imagens/solol.jfif" alt=" Capa do livro Solo Leveling">
                </div>

                <!-- Detalhes do livro (informações e botões) -->
                <div class="detalhes">
                    <h1>Solo Leveling</h1>
                    <h3>Autor: Chugong</h3>
                    <p><strong>Editora:</strong>Panini</p>
                    <p class="preco">Por: R$ 49,90</p>

                    <!-- Controle de quantidade do livro -->
                    <div class="quantidade">
                        <button onclick="alterarQuantidade(-1)">-</button>
                        <input type="text" id="quantidade" value="1">
                        <button onclick="alterarQuantidade(1)">+</button>
                    </div>

                    <!-- Botão para comprar -->
                    <a href="../chekout.html" target="_blank"class="compra">COMPRAR</a>

                    <!-- Formulário para calcular o frete -->
                    <div class="cep">
                        <input type="text" placeholder="Informe seu CEP">
                        <button>Calcular Frete</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Seção com a descrição do livro -->
        <section>
            <div class="descricao-livro">
                <h2>Descrição</h2>

                <p>Às vezes, além do portal, surgem monstros assustadores e verdadeiramente absurdosque beiram ao desespero.Uma masmorra dupla. E o que aguardava os caçadores lá…!</p>
        
                    
            </div>
        </section>
    </main>

</body>
</html>
